<!--Example showing the concept of fetch API-- | fetch() method -->
<script>
    function myFun(){
        fetch("https://jsonplaceholder.typicode.com/posts")
             .then(response => response.json())
                 .then((arr)=>{
                    //console.log(arr);
                    var table = "<table border=1 cellspacing= '0' cellpadding='5'><tr><th>UserId</th><tr><th>Id</th><th>Title</th><th>Body<th></tr>";
                        for(var index in arr){
                            table+=`<tr><td>${arr[index].userId}</td>><td>${arr[index].Id}</td>><td>${arr[index].title}</td>><td>${arr[index].body}</td></tr>`;
                        }
                        table+="</table>";
                        document.write(table);
                 }).catch((errorMsg)=>{
                    console.log(errorMsg);
                 })
    }
    myFun();
</script>
